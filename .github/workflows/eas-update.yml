name: EAS Update (OTA)

# Pushes an over-the-air update to TestFlight testers (the "preview" channel)
# every time you merge to main. JS/content changes — new chapters, lesson edits,
# bug fixes — go live in minutes with NO App Store review.
#
# DISABLED for automatic runs: this needs an EXPO_TOKEN secret, and without it
# the job fails on every push to main. It's the optional TestFlight/App-Store
# path — the live site ships via web-deploy.yml, not this. Left as manual-only
# so it no longer spams failure emails but can still be run on demand.
#
# To re-enable OTA updates:
#   1. Add an EXPO_TOKEN secret in GitHub
#      (repo Settings → Secrets and variables → Actions → New repository secret).
#      Create the token at https://expo.dev/accounts/[you]/settings/access-tokens
#   2. Either run this workflow manually (Actions tab → "Run workflow"), or
#      restore the `push:` trigger below to publish on every merge to main.

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}"
